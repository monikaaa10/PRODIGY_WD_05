<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="weather-card">

        <!-- Heading -->
        <h1>
            <i class="fas fa-cloud-sun"></i>
            Weather App
        </h1>

        <!-- Search Box -->
        <div class="search-box">

            <input
                type="text"
                id="city"
                placeholder="Enter city name">

            <button onclick="getWeather()">
                <i class="fas fa-search"></i><br>
                Search
            </button>

        </div>

        <!-- Current Location -->
        <button class="location-btn" onclick="getLocationWeather()">
            <i class="fas fa-location-dot"></i>
            Use Current Location
        </button>

        <!-- Date -->
        <div id="dateTime" class="date-time"></div>

        <!-- Weather Details -->
        <div id="weather" class="weather" style="display:none;">

            <h2 id="cityName"></h2>

            <img
                id="icon"
                src=""
                alt="Weather Icon">

            <h1 id="temp"></h1>

            <p id="description"></p>

            <div class="details">

                <div class="card">
                    <i class="fas fa-temperature-half"></i>
                    <h3>Feels Like</h3>
                    <p id="feelsLike"></p>
                </div>

                <div class="card">
                    <i class="fas fa-tint"></i>
                    <h3>Humidity</h3>
                    <p id="humidity"></p>
                </div>

                <div class="card">
                    <i class="fas fa-wind"></i>
                    <h3>Wind</h3>
                    <p id="wind"></p>
                </div>

                <div class="card">
                    <i class="fas fa-gauge-high"></i>
                    <h3>Pressure</h3>
                    <p id="pressure"></p>
                </div>

            </div>

        </div>

        <footer>
            Powered by
            <span>OpenWeather API</span>
        </footer>

    </div>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
